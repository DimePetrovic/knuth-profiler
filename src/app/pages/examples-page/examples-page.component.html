<section class="p-4 md:p-8 space-y-4">
  <app-workflow-pipeline
    [facade]="facade"
    [title]="'Примери'"
    [subtitle]="'Изабери пример па води корисника кроз исти ток корака.'"
    [firstStepTitle]="'Корак 1: Избор примера'">

    <div pipeline-step-0 class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <button
        *ngFor="let ex of facade.examples"
        type="button"
        class="text-left rounded-xl border p-4 hover:bg-gray-50"
        [class.border-gray-900]="ex.id === facade.selectedId()"
        (click)="facade.pickExample(ex.id)">
        <div class="font-medium">{{ ex.title }}</div>
        <div class="text-sm text-gray-600">{{ ex.description }}</div>
      </button>
    </div>
  </app-workflow-pipeline>

  <section *ngIf="facade.step() > 0" class="border rounded-xl p-4 bg-white min-h-[520px]">
    <app-graph-canvas
      [data]="facade.selectedData()"
      [layoutName]="facade.layoutName()"
      [overlay]="facade.overlay()">
    </app-graph-canvas>
  </section>
</section>
