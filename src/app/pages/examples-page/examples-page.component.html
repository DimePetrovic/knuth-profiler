<section class="p-4 md:p-8 space-y-6 md:space-y-7 lg:space-y-8">
  <app-workflow-pipeline
    class="block"
    [facade]="facade"
    [title]="'Примери'"
    [subtitle]="workflowSubtitle()"
    [firstStepTitle]="'Корак 1: Избор примера'">

    <div pipeline-step-0 class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
      <button
        *ngFor="let ex of facade.examples"
        type="button"
        class="text-left rounded-xl border p-4 hover:bg-gray-50 transition"
        [class.border-gray-900]="ex.id === facade.selectedId()"
        [class.bg-gray-50]="ex.id === facade.selectedId()"
        [class.ring-2]="ex.id === facade.selectedId()"
        [class.ring-gray-900]="ex.id === facade.selectedId()"
        (click)="facade.pickExample(ex.id)">
        <div class="flex items-center justify-between gap-2">
          <div class="font-medium">{{ ex.title }}</div>
          <span *ngIf="ex.id === facade.selectedId()" class="text-xs font-semibold text-gray-900 bg-white border border-gray-300 rounded-full px-2 py-0.5">
            Одабрано
          </span>
        </div>
        <div class="text-sm text-gray-600">{{ ex.description }}</div>
      </button>
    </div>
  </app-workflow-pipeline>

  <section *ngIf="facade.step() > 0" class="border rounded-xl p-4 md:p-5 lg:p-6 bg-white min-h-[440px] md:min-h-[520px]">
    <app-graph-canvas
      [data]="facade.selectedData()"
      [layoutName]="facade.layoutName()"
      (layoutNameChange)="facade.setLayout($event)"
      [overlay]="facade.overlay()">
    </app-graph-canvas>
  </section>
</section>
